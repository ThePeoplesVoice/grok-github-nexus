name: 🤖 Multi-AI PR Analyzer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analyze-with-all-ais:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyGithub

      - name: Run Multi-AI Analysis
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
        run: |
          python << 'EOF'
import os
import json
import requests
from datetime import datetime

print("🤖 Starting Multi-AI PR Analysis...")

pr_number = os.environ.get('PR_NUMBER')
repo_name = os.environ.get('REPO_NAME')
github_token = os.environ.get('GITHUB_TOKEN')

# Fetch PR details from GitHub API
try:
    headers = {"Authorization": f"token {github_token}"}
    pr_url = f"https://api.github.com/repos/{repo_name}/pulls/{pr_number}"
    pr_response = requests.get(pr_url, headers=headers)
    pr_data = pr_response.json()
    
    pr_title = pr_data.get('title', 'No title')
    pr_body = pr_data.get('body', 'No description')
    pr_files = pr_data.get('changed_files', 0)
    
    print(f"✅ PR fetched: {pr_title}")
    
except Exception as e:
    print(f"❌ Error fetching PR: {str(e)}")
    pr_title = "PR Analysis"
    pr_body = "Could not fetch PR details"
    pr_files = 0

# Analyze with Grok
grok_analysis = "Grok analysis skipped (add GROK_API_KEY secret)"
if os.environ.get("GROK_API_KEY"):
    try:
        prompt = f"""Review this pull request and provide analysis:
1. Code quality assessment
2. Potential issues or security concerns
3. Suggestions for improvement
4. Overall PR score (1-10)

PR Title: {pr_title}
PR Description: {pr_body}
Files Changed: {pr_files}"""
        
        response = requests.post(
            "https://api.x.ai/v1/chat/completions",
            headers={"Authorization": f"Bearer {os.environ['GROK_API_KEY']}"},
            json={
                "model": "grok-3",
                "messages": [{"role": "user", "content": prompt}],
                "temperature": 0.7,
                "max_tokens": 500
            },
            timeout=20
        )
        if response.status_code == 200:
            grok_analysis = response.json()["choices"][0]["message"]["content"]
            print("✅ Grok analysis complete")
    except Exception as e:
        grok_analysis = f"Grok analysis failed: {str(e)[:100]}"

# Create analysis report
analysis_md = f"""## 🤖 Multi-AI PR Analysis Report

**PR:** #{pr_number}
**Title:** {pr_title}
**Files Changed:** {pr_files}

---

### 🔥 Grok's Analysis (Speed & Insight)

{grok_analysis}

---

### ✅ Recommendation

Please review the analysis above and address any concerns raised by the AI models.

*Generated: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}*
"""

with open('/tmp/pr_analysis.md', 'w') as f:
    f.write(analysis_md)

print("✅ Analysis complete")
print(analysis_md)
EOF

      - name: Post Analysis to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            try {
              const analysis = fs.readFileSync('/tmp/pr_analysis.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: analysis
              });
              console.log('✅ Comment posted successfully');
            } catch (error) {
              console.log('⚠️ Could not post comment:', error.message);
            }
