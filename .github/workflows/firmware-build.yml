name: 🌌 Firmware Build Automation

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 4 * * *'  # Daily \~2 PM AEST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [aprs, aic8800, AT32, STM32]  # Extend as needed

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache toolchains & dependencies
        uses: actions/cache@v4
        with:
          path: |
            \~/.cache
            /opt/toolchains
          key: \( {{ matrix.project }}-toolchain- \){{ hashFiles('**/Makefile', '**/CMakeLists.txt') }}

      # === AVR / TinyAPRS ===
      - name: Setup AVR Toolchain
        if: contains(matrix.project, 'aprs')
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-avr avr-libc binutils-avr make
          avr-gcc --version

      - name: Build TinyAPRS Firmware
        if: contains(matrix.project, 'aprs')
        run: |
          cd TinyAPRS  # or wherever your Makefile lives
          make clean && make
          mkdir -p artifacts
          cp *.hex *.bin artifacts/ || echo "No hex/bin found"

      # === STM32 / AT32 (ARM) ===
      - name: Setup ARM Toolchain
        if: contains(matrix.project, 'STM') || contains(matrix.project, 'AT32')
        uses: actions/setup-python@v5  # or direct arm-none-eabi
        with:
          python-version: '3.11'
      - name: Install ARM GCC & Build Tools
        if: contains(matrix.project, 'STM') || contains(matrix.project, 'AT32')
        run: |
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi make cmake ninja-build
          arm-none-eabi-gcc --version

      - name: Build STM/AT32 Projects
        if: contains(matrix.project, 'STM') || contains(matrix.project, 'AT32')
        run: |
          # Adapt to your Makefile or CMake
          make -C . || cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi-gcc.cmake && cmake --build build
          mkdir -p artifacts
          find . -name "*.hex" -o -name "*.bin" -o -name "*.elf" | xargs -I {} cp {} artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-\( {{ matrix.project }}- \){{ github.sha }}
          path: artifacts/
          retention-days: 30

      - name: Create Release on Tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: "Firmware Release ${{ github.ref_name }}"