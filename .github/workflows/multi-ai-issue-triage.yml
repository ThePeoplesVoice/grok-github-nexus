name: 🌌 Multi-AI Issue Triage (Hardened)

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Grok Triage with Fallback
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c '
import os, requests, json
print("Starting triage...")
if not os.environ.get("GROK_API_KEY"):
    print("⚠️ No GROK_API_KEY - skipping AI call")
else:
    try:
        r = requests.post("https://api.x.ai/v1/chat/completions",
            headers={"Authorization": f"Bearer {os.environ["GROK_API_KEY"]}"},
            json={"model": "grok-3", "messages": [{"role": "user", "content": "Categorize this GitHub issue and suggest labels: Title: ${{ github.event.issue.title }} Body: ${{ github.event.issue.body }}"}]},
            timeout=20)
        print(r.json())
    except Exception as e:
        print("Error:", str(e)[:200])
print("✅ Triage step completed")
          '

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = "🌌 Grok Nexus triage ran. Check logs for details.";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });