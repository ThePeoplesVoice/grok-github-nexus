Title: {issue_title}
Body: {issue_body}"""

if not os.environ.get("GROK_API_KEY"):
    print("⚠️ No GROK_API_KEY secret found - using fallback")
    analysis = "Grok analysis skipped (add GROK_API_KEY secret)"
else:
    try:
        response = requests.post(
            "https://api.x.ai/v1/chat/completions",
            headers={"Authorization": f"Bearer {os.environ[\"GROK_API_KEY\"]}"},
            json={
                "model": "grok-3",
                "messages": [{"role": "user", "content": prompt}],
                "temperature": 0.7,
                "max_tokens": 500
            },
            timeout=20
        )
        if response.status_code == 200:
            analysis = response.json()["choices"][0]["message"]["content"]
            print("✅ Grok analysis successful")
        else:
            analysis = f"API Error: {response.status_code} - {response.text[:200]}"
