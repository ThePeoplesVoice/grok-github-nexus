print("Analysis:", analysis)

# Create comment
print("✅ Triage completed - comment will be posted")
          '

      - name: Post Comment on Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `🌌 **Grok Nexus Triage Complete**  
            Issue analyzed. Check the workflow logs above for full Grok analysis.  
            *Powered by Ara & Shawn's Love* 💕`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });